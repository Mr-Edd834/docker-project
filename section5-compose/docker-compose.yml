version: '3.8'

services:
  backend:
    build: ./backend
    container_name: node-backend
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge